<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias - C4A</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #1f1f1f;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 3.5rem;
      color: #CF2D3A;
      font-family: 'Bebas Neue', cursive;
    }
    p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 20px auto;
    }
    .btn-volver {
      margin-top: 30px;
      background-color: #CF2D3A;
      color: #fff;
      padding: 12px 28px;
      border: none;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.1rem;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-volver:hover {
      background-color: #B4272E;
    }
  </style>
</head>
<body>
  <h1>¡Gracias por tu mensaje!</h1>
  <p>Tu solicitud fue enviada exitosamente. Nuestro equipo la está revisando y nos contactaremos contigo lo antes posible. Valoramos tu interés en C4A y en proteger tu organización con ciberseguridad ofensiva de alto nivel.</p>
  <a class="btn-volver" href="index.html">Volver al Inicio</a>
</body>
</html>
